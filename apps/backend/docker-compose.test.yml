## Standalone Postgres for integration tests (internal/services/booking_concurrency_test.go).
## Separate from the root docker-compose.yaml on purpose: different port/container/
## no persistent volume, so it never collides with — or accumulates state from — the
## dev database.
##
## Usage:
##   docker compose -f docker-compose.test.yml up -d --wait
##   go test -tags=integration ./internal/services/... -run TestBookingCreate_Concurrent -v
##   docker compose -f docker-compose.test.yml down -v
services:
  postgres-test:
    image: postgres:15-alpine
    container_name: asset_sut_postgres_test
    restart: "no"
    environment:
      POSTGRES_USER: ${TEST_DB_USER:-testuser}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-testpass}
      POSTGRES_DB: ${TEST_DB_NAME:-asset_sut_test}
    ports:
      - "${TEST_DB_PORT:-5433}:5432"
    tmpfs:
      # No named volume: every `up` starts from a clean, empty database.
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_DB_USER:-testuser}"]
      interval: 3s
      timeout: 3s
      retries: 20
